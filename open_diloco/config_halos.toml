# HALoS baseline config
# HALoS (ICML 2025) 논문과의 비교를 위한 baseline 실험 설정
# 기존 config.toml과 동일한 모델/데이터/하이퍼파라미터, halos_mode만 다름

# Model configuration
path_model = "PrimeIntellect/llama-150m-fresh"

# Data configuration
dataset_name_or_path = "$C4"

# Training optimization
inner_optimizer_type = "adamw"
lr = 4e-4
warmup_steps = 1000
max_steps = 128000
validation = false
per_device_train_batch_size = 4
total_batch_size = 16
find_max_batch_size = false
precision = "fp16-mixed"
adjust_local_steps = false
initial_lr_adjust = true

# Project and logging
project = "${EXP}-halos-${WORLD_RANK}"

# LoRA
lora = false

# Checkpoint configuration
[ckpt]
interval = 200000
path = "${EXP}_halos_ckpt"


# Hivemind configuration
[hv]
galaxy_size = 4
local_steps = 32
max_outer_optimization_steps = 2500
matchmaking_time = 300   # halos_async_timeout으로 override됨
averaging_timeout = 1800
average_state_every = 999999999
skip_load_from_peers = true
initial_peers = ["$PEER"]
world_rank = "${WORLD_RANK}"

token_weighted_aggregation = false
token_weight_mode = "linear"

use_throughput_adaptive_sizing = true

gradient_magnitude_top_k_ratio = 1.0
gradient_magnitude_top_k_ratio_by_size = true
gradient_magnitude_selection_mode = "layer"
gradient_importance_metric = "magnitude"

enable_max_staleness = false
max_staleness = 10

enable_warmup = false
warmup_epochs = 5

# Outer sign update — 기존 방법과 동일하게 유지 (공정 비교)
outer_sign_update = false
outer_sign_aggregation = "majority_vote"
outer_sign_mode = "adaptive_mean"
outer_sign_error_feedback = false
hivemind_compression = "sign1bit"

outer_lr = 0.7
outer_use_nesterov_sgd = true
outer_lr_scheduler_type = "constant"
outer_warmup_steps = 0
outer_weight_decay = 0.0

enable_gradient_clipping = false
gradient_clip_norm = 2.0

minimal_pseudo_grad_stats = true

# ─── HALoS 설정 ──────────────────────────────────────────────────────────────
halos_mode = true
halos_async_timeout = 60.0

# GPS (Global Parameter Server) — standalone 서버로 실행
# 실행: python halos_gps.py --model <model> --port 29600 --lr 0.3 --beta 0.5 --buffer_size 2
halos_gps_host = "163.152.51.44"
halos_gps_port = 29600
halos_gps_delayed_nesterov = true
halos_gps_lr = 0.3            # GLR(0.15) * d_g(2) = 0.3
halos_gps_beta = 0.5          # 글로벌 모멘텀 계수
halos_gps_buffer_size = 2     # d_g: 모멘텀 갱신 전 버퍼링할 업데이트 수
halos_gps_c = 0.0
halos_gps_ckpt_dir = "/data2tb/gps_ckpts"   # GPS 체크포인트 저장 디렉토리
halos_gps_ckpt_every = 32                   # GPS step 32회 = 2048 local steps (H=32, K=2)

# LPS (Local Parameter Server) — worker 프로세스 내에서 실행
# d_l=1 (worker 1개/region일 때), K=2 (GPS sync 주기)
halos_lps_lr = 0.2            # LLR(0.2) * d_l(1) = 0.2
halos_lps_beta = 0.9          # 로컬 모멘텀 계수
halos_lps_buffer_size = 1     # d_l: LPS 버퍼 크기 (1이면 매 step마다 모멘텀)
halos_lps_c = 0.0
halos_model_merge_weight = 0.25           # α: GPS→LPS 모델 병합 가중치
halos_local_updates_accumulation = 2      # K: GPS sync 전 LPS 업데이트 횟수
